name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'     # Only trigger when files in backend/ change

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip only the backend folder
        run: |
          cd backend
          zip -r ../deploy-package.zip . -x "node_modules/*" ".env" "*.log" "tests/*" ".git/*"
          echo "✅ Deployment package created"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          application-name: mdm-customer360-backend
          environment-name: mdm-customer360-prod
          deployment-package: deploy-package.zip
          aws-region: us-east-1
