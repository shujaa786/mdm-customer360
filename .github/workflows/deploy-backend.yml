name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'     # Only trigger when files in backend/ change
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      EB_APPLICATION_NAME: mdm-customer360-backend
      EB_ENVIRONMENT_NAME: mdm-customer360-prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip only the backend folder
        run: |
          cd backend
          zip -r ../deploy-package.zip . -x "node_modules/*" ".env" "*.log" "tests/*" ".git/*"
          echo "✅ Deployment package created"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundle and create application version
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="elasticbeanstalk-${AWS_REGION}-${ACCOUNT_ID}"
          VERSION_LABEL="${GITHUB_SHA::7}-$(date +%Y%m%d%H%M%S)"
          S3_KEY="${EB_APPLICATION_NAME}/${VERSION_LABEL}.zip"

          aws s3 cp deploy-package.zip "s3://${S3_BUCKET}/${S3_KEY}"

          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle S3Bucket="${S3_BUCKET}",S3Key="${S3_KEY}"

          echo "VERSION_LABEL=${VERSION_LABEL}" >> $GITHUB_ENV

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${VERSION_LABEL}"
